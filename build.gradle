plugins {
    id 'java'
    id 'application'
}

group = 'open.repocraft.server'
version = '0.1.0-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

application {
    mainClass = 'open.repocraft.server.ssh.SshGitServer'
}

tasks.register('runDemo', JavaExec) {
    group = 'application'
    description = 'Run SSH Git demo with autogenerated keys and sample repo'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'open.repocraft.server.ssh.SshGitDemo'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.apache.sshd:sshd-core:2.12.1'
    implementation 'org.slf4j:slf4j-simple:2.0.12'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}
